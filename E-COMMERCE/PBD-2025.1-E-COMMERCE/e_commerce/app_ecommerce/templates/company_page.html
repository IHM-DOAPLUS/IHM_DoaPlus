{% extends 'base.html' %}
{% load static %}

{% block content %}
{% include 'includes/header.html' %}
{% include 'includes/hero.html '%}


<section id="portfolio" class="portfolio section">
    <div class="container">
        <div class="isotope-layout" data-default-filter="*" data-layout="masonry" data-sort="original-order">
            <div div class="row gy-4 isotope-container" data-aos="fade-up" data-aos-delay="200">
                {% for item in itens %}
                <div class="col-lg-3 col-md-4 col-sm-6 portfolio-item isotope-item filter-app">
                    <div class="portfolio-content h-100 shadow-sm">
                        <a href="{% url 'ecommerce:item_dashboard' item.code_item %}">
                            {% if item.image %}
                            <img src="{{ item.image.url }}" class="img-fluid" alt="">
                            {% else %}
                            <span class="text-muted">Sem imagem</span>
                            {% endif %}
                            <div class="portfolio-info">
                                <h4>{{ item.name }}</h4>
                            </div>
                        </a>
                    </div>

                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>



{% include 'includes/footer.html' %}

{% endblock %}
