{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login - GP</title>
    <meta name="description" content="">
    <meta name="keywords" content="">

    <!-- Favicons -->
    <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
    <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&family=Raleway:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Vendor CSS Files -->
    <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">

    <!-- Main CSS File -->
    <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
    <link href="{% static 'assets/css/login.css' %}" rel="stylesheet">

</head>

<body>
    <main class="w-100 d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="login-card">
            <form action="{% url 'authentication:login' %}" method="POST">
                {% csrf_token %}
                <div class="login-logo">
                    <img src="{% static 'assets/img/logo.png' %}" alt="Logo" width="48" height="48"
                        style="border-radius:8px;">
                    <h1>GP</h1><span>.</span>
                </div>
                <h2 class="h4 mb-3 fw-bold text-center" style="color:var(--heading-color);">Acesse sua conta</h2>
                <div class="d-flex flex-column gap-2">
                    <div class="form-floating mb-2">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com"
                            name="{{form.username.name}}" required>
                        <label for="floatingInput">Email</label>
                    </div>
                    <div class="form-floating mb-2">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password"
                            name="{{form.password.name}}" required>
                        <label for="floatingPassword">Senha</label>
                    </div>
                </div>
                <div class="form-check text-start my-3">
                    <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
                    <label class="form-check-label" for="checkDefault">Lembrar-me</label>
                </div>
                <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
                <p class="mt-4 mb-2 text-center login-footer">&copy; 2017–2025 GP. Todos os direitos reservados.</p>
            </form>
        </div>
    </main>
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/vendor/aos/aos.js' %}"></script>
    <script src="{% static 'assets/vendor/glightbox/js/glightbox.min.js' %}"></script>
</body>

</html>
